# #######################################################################################
# HYPRLAND NVIDIA CONFIGURATION (Catppuccin Fancy Layout)
# #######################################################################################

# NVIDIA ENVIRONMENT VARIABLES
env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = WLR_NO_HARDWARE_CURSORS,1

# MONITOR SETTINGS
monitor=HDMI-A-2, 1920x1080@75, 0x0, 1
monitor=HDMI-A-3, 2560x1440@144, 1920x0, 1

# EXECUTE ON STARTUP
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = swww init
exec-once = waybar
# exec-once = blueman-applet  # replaced by custom/bluetooth waybar module
# Start the wallpaper engine
exec-once = swww-daemon

# Set the specific wallpaper on startup (wait 1 second to ensure daemon is ready)
exec-once = sleep 1 && swww img ~/hypr-dots/wallpaper.png
exec-once = swww-daemon --format xrgb


#Night light mode
exec-once = hyprsunset --temperature 4000

# INPUT
input {
    kb_layout = us,ru,ua,pl
    kb_options = grp:alt_shift_toggle
    follow_mouse = 1
}

# LOOK & FEEL
general {
    gaps_in = 5
    gaps_out = 15
    border_size = 2
    # Catppuccin Peach (#fab387) and Yellow (#f9e2af) gradient
    col.active_border = rgba(fab387ff) rgba(f9e2afff) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 5
        passes = 2
    }
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}
# Window rules
windowrulev2 = float, class:^(com.waybar.volume-popup)$
windowrulev2 = size 320 280, class:^(com.waybar.volume-popup)$
windowrulev2 = move 100%-340 45, class:^(com.waybar.volume-popup)$
windowrulev2 = animation slide, class:^(com.waybar.volume-popup)$
windowrulev2 = pin, class:^(com.waybar.volume-popup)$
windowrulev2 = stayfocused, class:^(com.waybar.volume-popup)$

windowrulev2 = float, class:^(com.waybar.bluetooth-popup)$
windowrulev2 = size 340 400, class:^(com.waybar.bluetooth-popup)$
windowrulev2 = move 100%-360 45, class:^(com.waybar.bluetooth-popup)$
windowrulev2 = animation slide, class:^(com.waybar.bluetooth-popup)$
windowrulev2 = pin, class:^(com.waybar.bluetooth-popup)$
windowrulev2 = stayfocused, class:^(com.waybar.bluetooth-popup)$

windowrulev2 = float, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = size 600 500, class:^(org.pulseaudio.pavucontrol)$
windowrulev2 = center, class:^(org.pulseaudio.pavucontrol)$

$mainMod = SUPER

# Applications
bind = ALT, C, exec, ~/Documents/themes/keybinds/keybinds.sh
bind = ALT, Return, exec, kitty
bind = ALT, Q, killactive, 
bind = $mainMod, M, exit, 
bind = $mainMod, F, fullscreen, 
bind = $mainMod, E, exec, nautilus
bind = ALT, F, togglefloating, 
bind = ALT, X, exec, rofi -show drun
bind = ALT, Z, exec, ~/.config/rofi/scripts/powermenu.sh
bind = ALT, S, togglesplit, 
bind = ALT, F1, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, L, exec, swaylock
bind = $mainMod, K, exec, killall waybar
bind = $mainMod, J, exec, waybar

# Focus (Super + WASD Style)
bind = $mainMod, A, movefocus, l
bind = $mainMod, D, movefocus, r
bind = $mainMod, W, movefocus, u
bind = $mainMod, S, movefocus, d

# Switch Workspaces 1-5 (Alt + 1-5)
bind = ALT, 1, workspace, 1
bind = ALT, 2, workspace, 2
bind = ALT, 3, workspace, 3
bind = ALT, 4, workspace, 4
bind = ALT, 5, workspace, 5

# Switch Workspaces 6-10 (Ctrl + 1-5)
bind = CTRL, 1, workspace, 6
bind = CTRL, 2, workspace, 7
bind = CTRL, 3, workspace, 8
bind = CTRL, 4, workspace, 9
bind = CTRL, 5, workspace, 10

# Move Window to Workspace 1-5 (Super + 1-5)
bind = $mainMod, 1, movetoworkspace, 1
bind = $mainMod, 2, movetoworkspace, 2
bind = $mainMod, 3, movetoworkspace, 3
bind = $mainMod, 4, movetoworkspace, 4
bind = $mainMod, 5, movetoworkspace, 5

# Move Window to Workspace 6-10 (Ctrl + Shift + 1-5)
bind = CTRL SHIFT, 1, movetoworkspace, 6
bind = CTRL SHIFT, 2, movetoworkspace, 7
bind = CTRL SHIFT, 3, movetoworkspace, 8
bind = CTRL SHIFT, 4, movetoworkspace, 9
bind = CTRL SHIFT, 5, movetoworkspace, 10

# Mouse Binds (Move/Resize)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
# Ensure it looks exactly like this (Win + Shift + S)
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
